<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazi Md. Rakibul Hassan | Portfolio</title>
    
    <!-- Google Fonts: Roboto Mono for monospace look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar elevation-2">
        <div class="nav-content container">
            <div class="logo">>&nbsp;kazrkb</div>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#experience">Experience</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero container" id="about">
        <div class="hero-text">
            <h1 id="hero-name" class="typing-effect"></h1>
            <h2 id="hero-title" class="primary-text"></h2>
            <p id="hero-bio"></p>
            <div class="hero-actions">
                <a href="#projects" class="btn btn-primary elevation-2 ripple">View Projects</a>
                <a href="https://github.com/kazrkb" target="_blank" class="btn btn-outline ripple"><i class="fa-brands fa-github"></i> GitHub</a>
                <a href="https://linkedin.com/in/kazimdrakibulhassan" target="_blank" class="btn btn-outline ripple"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
            </div>
        </div>
    </header>

    <!-- Skills Section -->
    <section class="section container" id="skills">
        <h2 class="section-title">Technical Skills</h2>
        <div class="skills-grid" id="skills-container">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Projects Section -->
    <section class="section container" id="projects">
        <h2 class="section-title">Featured Projects</h2>
        <div class="projects-grid" id="projects-container">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Experience Section -->
    <section class="section container" id="experience">
        <h2 class="section-title">Experience & Education</h2>
        <div class="timeline-container">
            <div class="timeline" id="experience-container">
                <h3>Experience</h3>
                <!-- Populated by JS -->
            </div>
            <div class="timeline" id="education-container">
                <h3>Education</h3>
                <!-- Populated by JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer elevation-4">
        <div class="container text-center">
            <p>&copy; 2026 Kazi Md. Rakibul Hassan. Built with Vanilla JS & CSS.</p>
        </div>
    </footer>


    <script src="script.js"></script>
</body>
</html>
